<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Website Content Loader</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        nav { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #view-panel { padding: 20px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; min-height: 150px; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1. Navigation Menu -->
    <nav>
        <button onclick="changePage('https://urainum.neocities.org/archive/localserver/73851df5fd78bee6f1cb6a4bc41a8330a48ce949')">Enter</button>
    </nav>

    <!-- 2. Dynamic Target Container -->
    <main id="view-panel">TEST</main>

    <script>
        /**
         * Fetches an HTML component and updates the view panel
         * @param {string} pageUrl - The relative path of the file to load
         */
        function changePage(pageUrl) {
            const panel = document.getElementById('view-panel');
            panel.innerHTML = "<em>Loading content...</em>";

            fetch(pageUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`File not found (${response.status})`);
                    }
                    return response.text();
                })
                .then(htmlString => {
                    panel.innerHTML = htmlString;
                })
                .catch(error => {
                    console.error('Error:', error);
                    panel.innerHTML = `<p class="error">⚠️ Could not load the requested page.</p>`;
                });
        }

        // Automatically load the home page on first visit
        document.addEventListener('DOMContentLoaded', () => {
            changePage('');
        });
    </script>
</body>
</html>
