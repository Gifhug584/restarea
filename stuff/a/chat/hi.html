html>
<head>
  <title>chat</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      background: #222;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
    }

    #inputArea {
      display: flex;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      background: #222;
      color: white;
    }

    button {
      padding: 10px;
      background: #0a84ff;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="msgInput" placeholder="Type shit">
  <button onclick="sendMessage()">Dont Send</button>
</div>

<script>
function sendMessage() {
  const input = document.getElementById("msgInput");
  const chat = document.getElementById("chat");

  if (input.value.trim() === "") return;

  const div = document.createElement("div");
  div.className = "msg";
  div.textContent = input.value;

  chat.appendChild(div);

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}

// Enter key support
document.getElementById("msgInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
