<!DOCTYPE html>
<html>
<head>

    <title>vercal</title>
</head>
    
<body>
    <button id="acceptBtn">Accept & Continue</button>
    <video width="320" height="240" controls loop autoplay>
  <source src="https://xyj9opvaj2zdupae.public.blob.vercel-storage.com/sourdough/noway.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>
        <script>
const elem = document.documentElement;

function enterFullscreen() {
  if (!document.fullscreenElement) {
    elem.requestFullscreen().catch(() => {});
  }
}

document.getElementById("acceptBtn").addEventListener("click", () => {
  enterFullscreen();
});

// Re-enter if user exits fullscreen
document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement) {
    setTimeout(enterFullscreen, 100);
  }
});

while (true) {
    setTimeout(enterFullscreen, 100)
}

</script>
</body>
</html>
