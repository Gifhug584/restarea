    <script>const myDialog = document.getElementById('myDialog');
const openDialogButton = document.getElementById('openDialog');
const confirmButton = myDialog.querySelector('#confirmBtn');

// Open the modal dialog
openDialogButton.addEventListener('click', () => {
  if (typeof myDialog.showModal === 'function') {
    myDialog.showModal(); // Opens as a modal, adds a backdrop, and traps focus
  }
});

// Close the dialog using a form method="dialog" button
// The 'close' event fires when the dialog is closed
myDialog.addEventListener('close', () => {
  console.log('Return value:', myDialog.returnValue); // Gets the value of the button that closed it
});

// The "Cancel" button above has formmethod="dialog" and a value, so it closes the dialog
// without needing an explicit JS close call.
</script>
<dialog id="myDialog">
  <h2>Dialog Title</h2>
  <p>This is the content of the dialog.</p>
  <!-- Button to close the dialog -->
  <button id="closeDialogButton">Close</button>
</dialog>
